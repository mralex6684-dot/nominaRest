<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Empleados</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="main">
    <h2>Empleados</h2>

    <button onclick="crearEmpleado()">Agregar</button>

    <table width="100%">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Documento</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>

<script src="../js/app.js"></script>
<script>
async function cargar() {
    const res = await fetch("http://localhost/nominaRest/public/index.php?url=empleados");
    const data = await res.json();

    let html = "";

    data.forEach(e => {
        html += `<tr>
            <td>${e.nombre}</td>
            <td>${e.documento}</td>
        </tr>`;
    });

    document.getElementById("tabla").innerHTML = html;
}

cargar();

function crearEmpleado() {
    const nombre = prompt("Nombre:");
    const documento = prompt("Documento:");

    fetch("http://localhost/nominaRest/public/index.php?url=empleados", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nombre,
            documento,
            correo: "",
            telefono: "",
            id_rol: 1,
            salario_base: 1000000
        })
    }).then(() => cargar());
}
</script>

</body>
</html>
