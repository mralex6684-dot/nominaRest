<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Generar Nómina</title>

<link rel="stylesheet" href="styles.css">

</head>


<body>

<div class="layout">

<div class="sidebar">

<h2 class="logo">NominaRest</h2>

<ul class="menu">
    
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="empleados.html">Empleados</a></li>
<li><a href="generar_nomina.html">Generar nómina</a></li>
<li><a href="reportes.html">Reportes</a></li>

</ul>

</div>


<div class="content">


<div class="topbar">

<input class="search" placeholder="Buscar empleado...">

<div class="usuario">
Administrador
</div>

</div>

<div class="main">

<div class="card">

<h2>Generar Nómina</h2>

<select id="empleadoSelect"></select>

<button class="btn-agregar" onclick="generarNomina()">
Generar
</button>

</div>


<div class="card">

<h3>Resultado</h3>

<div id="resultadoNomina"></div>

</div>


</div>


</div>


</div>


<script>

const API = "http://localhost/nominaRest/public/index.php?url="


async function cargarEmpleados(){

const res = await fetch(API + "empleados")

const empleados = await res.json()

let options = ""

empleados.forEach(emp =>{

options += `<option value="${emp.id}">
${emp.nombre}
</option>`

})

document.getElementById("empleadoSelect").innerHTML = options

}


async function generarNomina(){

const id = document.getElementById("empleadoSelect").value

const res = await fetch(API + "nomina&id_empleado=" + id)

const data = await res.json()

document.getElementById("resultadoNomina").innerHTML = `

<p>Devengado: $${data.devengado}</p>
<p>Deducciones: $${data.deducciones}</p>
<p>Total a pagar: $${data.total}</p>

`

}

cargarEmpleados()

</script>


</body>
</html>
